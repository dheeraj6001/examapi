version: '3.9'

# Local development stack — includes a local MongoDB instance
# Usage: docker-compose -f docker-compose.dev.yml up

services:
  api:
    build:
      context: .
      target: builder
    container_name: cloud-solutions-api-dev
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/cloud_solutions
      JWT_SECRET: dev-jwt-secret
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: dev-refresh-secret
      JWT_REFRESH_EXPIRES_IN: 30d
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 1000
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run start:dev
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - cloud-dev-net

  mongo:
    image: mongo:7
    container_name: cloud-solutions-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cloud-dev-net

  mongo-express:
    image: mongo-express:latest
    container_name: cloud-solutions-mongo-express
    restart: unless-stopped
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      - mongo
    networks:
      - cloud-dev-net

volumes:
  mongo_data:

networks:
  cloud-dev-net:
    driver: bridge
